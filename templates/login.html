<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiRouterGUI Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page" style="max-width:420px;padding-top:60px;">
      <section class="panel">
        <h2 style="margin-top:0;">PiRouterGUI Login</h2>
        {% if error %}<p class="bad">{{ error }}</p>{% endif %}
        <form method="post" action="/login" class="add-device" style="flex-direction:column;align-items:stretch;">
          <input name="username" placeholder="Username" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Sign In</button>
        </form>
      </section>
    </main>
  </body>
</html>
